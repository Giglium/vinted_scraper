---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
    commit-message:
      prefix: "ci"
      include: "scope"
    reviewers:
      - "giglium"
    cooldown:
      default-days: 7

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      python-dependencies-major:
        patterns:
          - "*"
        update-types:
          - "major"
    commit-message:
      prefix: "build"
      include: "scope"
    reviewers:
      - "giglium"
    cooldown:
      default-days: 7
