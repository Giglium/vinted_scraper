---
name: Quickstarts

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # Runs every Monday at 9:00 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'schedule' || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test_quickstarts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        uses: "./.github/actions/setup-python"

      - name: Run the async wrapper quickstart
        run: uv run -m examples.async_wrapper

      - name: Run the async scraper quickstart
        run: uv run -m examples.async_scraper

      - name: Run the wrapper quickstart
        run: uv run -m examples.wrapper

      - name: Run the scraper quickstart
        run: uv run -m examples.scraper
