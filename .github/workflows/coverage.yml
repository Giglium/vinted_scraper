---
name: Coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions: read-all

jobs:
  coverage:
    runs-on: ubuntu-latest
    environment: coverage-reporting

    steps:
      - uses: actions/checkout@v6 # zizmor: ignore[unpinned-uses]
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: "./.github/actions/setup-python"

      - name: Run Coverage
        run: make coverage

      - name: Upload coverage reports to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v6.0.1 # zizmor: ignore[unpinned-uses]
        with:
          fail_ci_if_error: true
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codacy
        if: ${{ !env.ACT }}
        uses: codacy/codacy-coverage-reporter-action@v1 # zizmor: ignore[unpinned-uses]
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
          language: Python
