---
name: Feature request
description: Suggest an idea for this project
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions for this feature
          required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: What is the current behavior? And why doesn't it suit you?
      description: Explain the current situation and its limitations.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context or screenshots about the feature request.
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Would you be willing to contribute a PR?
      options:
        - "Yes"
        - "Yes, with guidance"
        - "No"
    validations:
      required: false
