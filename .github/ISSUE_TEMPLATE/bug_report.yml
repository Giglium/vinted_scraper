---
name: Bug report
description: Create a bug report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Minimal reproducible example
      description: Provide a minimal, copy-pastable code example.
      render: python
    validations:
      required: false

  - type: textarea
    id: debug-logs
    attributes:
      label: Debug logs
      description: |
        Please enable debug logging and paste the complete output below.
        See the [Debugging section in README](https://github.com/giglium/vinted_scraper#debugging) for instructions.
      render: text
    validations:
      required: false

  - type: input
    id: library-version
    attributes:
      label: vinted_scraper version
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.8"
        - "3.9"
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 22.04, Windows 11, macOS 14
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - pip
        - uv
        - pipx
        - poetry
        - other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, stacktraces, or information about the problem.
    validations:
      required: false
